<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designship 10th Anniversary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #E6007E;
    --gold: #D4AF37;
    --dark: #0d0d14;
    --grid-cols: 10;
    --grid-rows: 6;
  }

  body {
    background: var(--dark);
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    width: 100vw;
    height: 100vh;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* === Face Grid Background === */
  .face-grid {
    position: absolute;
    inset: -10px;
    display: grid;
    grid-template-columns: repeat(var(--grid-cols), 1fr);
    grid-template-rows: repeat(var(--grid-rows), 1fr);
    gap: 2px;
  }

  .face-cell {
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: scale(1.2) rotate(2deg);
    animation: cellReveal 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  .face-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(80%) brightness(0.5);
  }

  @keyframes cellReveal {
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* === Dark overlay === */
  .overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(
      ellipse at center,
      rgba(13, 13, 20, 0.3) 0%,
      rgba(13, 13, 20, 0.85) 70%,
      rgba(13, 13, 20, 0.95) 100%
    );
  }

  /* === Big "10" with face-filled text === */
  .ten-container {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .ten-svg {
    width: 75vw;
    max-width: 900px;
    height: auto;
    opacity: 0;
    animation: tenIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
  }

  @keyframes tenIn {
    from { opacity: 0; transform: scale(0.8); filter: blur(10px); }
    to { opacity: 1; transform: scale(1); filter: blur(0); }
  }

  /* === Glow ring around "10" === */
  .glow-ring {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .glow-ring::before {
    content: '';
    width: 50vmin;
    height: 50vmin;
    border-radius: 50%;
    border: 1px solid rgba(230, 0, 126, 0.3);
    box-shadow: 0 0 60px rgba(230, 0, 126, 0.15), inset 0 0 60px rgba(230, 0, 126, 0.08);
    opacity: 0;
    animation: glowIn 2s ease-out 1.2s forwards;
  }

  @keyframes glowIn {
    to { opacity: 1; }
  }

  /* === Text content === */
  .content {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    pointer-events: none;
  }

  .anniversary-label {
    font-size: clamp(10px, 1.3vw, 14px);
    font-weight: 500;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--pink);
    opacity: 0;
    transform: translateY(15px);
    animation: textUp 0.8s ease-out 2.0s forwards;
    margin-bottom: 12px;
  }

  .title-main {
    font-size: clamp(56px, 12vw, 140px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 0.9;
    opacity: 0;
    transform: translateY(30px);
    animation: textUp 1s ease-out 2.2s forwards;
    background: linear-gradient(
      180deg,
      #ffffff 0%,
      #ffffff 50%,
      var(--pink) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-year {
    font-size: clamp(16px, 2.5vw, 28px);
    font-weight: 300;
    letter-spacing: 0.4em;
    margin-top: 16px;
    opacity: 0;
    transform: translateY(20px);
    animation: textUp 0.8s ease-out 2.5s forwards;
    color: rgba(255, 255, 255, 0.6);
  }

  .title-tagline {
    font-size: clamp(11px, 1.2vw, 15px);
    font-weight: 500;
    letter-spacing: 0.2em;
    margin-top: 24px;
    opacity: 0;
    transform: translateY(20px);
    animation: textUp 0.8s ease-out 2.8s forwards;
    color: rgba(255, 255, 255, 0.45);
  }

  @keyframes textUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* === Confetti / sparkle particles === */
  .particles {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    opacity: 0;
    animation: sparkle ease-in-out infinite;
  }

  .particle--circle {
    border-radius: 50%;
    background: var(--pink);
  }

  .particle--square {
    background: var(--gold);
    transform: rotate(45deg);
  }

  .particle--line {
    background: rgba(255, 255, 255, 0.5);
    border-radius: 2px;
  }

  @keyframes sparkle {
    0% { opacity: 0; transform: translateY(0) scale(0) rotate(0deg); }
    15% { opacity: 0.8; }
    50% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-60vh) scale(1) rotate(360deg); }
  }

  /* === Golden accent lines === */
  .accent-line {
    position: absolute;
    z-index: 8;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
    height: 1px;
    opacity: 0;
    animation: lineReveal 1.2s ease-out forwards;
  }

  .accent-line--top {
    top: 20%;
    left: 10%;
    right: 10%;
    animation-delay: 1.8s;
  }

  .accent-line--bottom {
    bottom: 20%;
    left: 10%;
    right: 10%;
    animation-delay: 2.0s;
  }

  @keyframes lineReveal {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 0.4; transform: scaleX(1); }
  }

  /* === Scroll hint === */
  .scroll-hint {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    animation: fadeIn 0.6s ease 3.5s forwards;
  }

  .scroll-hint span {
    font-size: 9px;
    letter-spacing: 0.4em;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 500;
  }

  .scroll-line {
    width: 1px;
    height: 36px;
    background: linear-gradient(180deg, var(--pink), transparent);
    animation: scrollPulse 1.8s ease-in-out infinite;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.2; transform: scaleY(0.5); }
    50% { opacity: 0.8; transform: scaleY(1); }
  }

  /* === Animated shimmer across faces === */
  .shimmer {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: linear-gradient(
      105deg,
      transparent 0%,
      transparent 40%,
      rgba(230, 0, 126, 0.12) 45%,
      rgba(230, 0, 126, 0.2) 50%,
      rgba(230, 0, 126, 0.12) 55%,
      transparent 60%,
      transparent 100%
    );
    background-size: 200% 100%;
    animation: shimmerMove 4s ease-in-out 2s infinite;
    pointer-events: none;
  }

  @keyframes shimmerMove {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>
<div class="hero">
  <!-- Background face grid -->
  <div class="face-grid" id="faceGrid"></div>

  <!-- Dark vignette overlay -->
  <div class="overlay"></div>

  <!-- Shimmer effect -->
  <div class="shimmer"></div>

  <!-- Glow ring -->
  <div class="glow-ring"></div>

  <!-- Big "10" with face grid clipped inside -->
  <div class="ten-container">
    <svg class="ten-svg" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="tenClip">
          <!-- "1" -->
          <path d="M60 20 L120 20 L120 280 L60 280 Z"/>
          <!-- "0" -->
          <ellipse cx="340" cy="150" rx="160" ry="130"/>
        </clipPath>
        <clipPath id="tenInnerClip">
          <!-- Inner cutout for "0" -->
          <rect x="0" y="0" width="600" height="300"/>
        </clipPath>
        <!-- Face grid pattern inside the 10 -->
        <pattern id="facePattern" x="0" y="0" width="120" height="100" patternUnits="userSpaceOnUse">
          <image id="patImg0" x="0" y="0" width="60" height="50" preserveAspectRatio="xMidYMid slice"/>
          <image id="patImg1" x="60" y="0" width="60" height="50" preserveAspectRatio="xMidYMid slice"/>
          <image id="patImg2" x="0" y="50" width="60" height="50" preserveAspectRatio="xMidYMid slice"/>
          <image id="patImg3" x="60" y="50" width="60" height="50" preserveAspectRatio="xMidYMid slice"/>
        </pattern>
      </defs>
      <!-- "1" shape filled with faces -->
      <g>
        <path d="M30 20 L110 20 L110 280 L80 280 L80 60 L30 75 Z" fill="url(#facePattern)" opacity="0.9"/>
        <path d="M30 20 L110 20 L110 280 L80 280 L80 60 L30 75 Z" fill="none" stroke="rgba(230,0,126,0.5)" stroke-width="1.5"/>
      </g>
      <!-- "0" shape filled with faces -->
      <g>
        <ellipse cx="360" cy="150" rx="155" ry="128" fill="url(#facePattern)" opacity="0.9"/>
        <ellipse cx="360" cy="150" rx="90" ry="75" fill="#0d0d14"/>
        <ellipse cx="360" cy="150" rx="155" ry="128" fill="none" stroke="rgba(230,0,126,0.5)" stroke-width="1.5"/>
        <ellipse cx="360" cy="150" rx="90" ry="75" fill="none" stroke="rgba(230,0,126,0.3)" stroke-width="1"/>
      </g>
    </svg>
  </div>

  <!-- Accent lines -->
  <div class="accent-line accent-line--top"></div>
  <div class="accent-line accent-line--bottom"></div>

  <!-- Text content -->
  <div class="content">
    <p class="anniversary-label">10th Anniversary</p>
    <h1 class="title-main">Designship</h1>
    <p class="title-year">2025.10.11 &mdash; 10.12</p>
    <p class="title-tagline">TOKYO MIDTOWN HALL & CONFERENCE</p>
  </div>

  <!-- Sparkle particles -->
  <div class="particles" id="particles"></div>

  <!-- Scroll hint -->
  <div class="scroll-hint">
    <span>SCROLL</span>
    <div class="scroll-line"></div>
  </div>
</div>

<script>
  const speakerImages = [
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-600x600_v-fs_webp_fc5327e0-1e3c-42c9-9028-c731c4caed77_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-912x912_v-fs_webp_b2877c9d-2ce1-4dae-b2b1-438b7b4cd027_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-886x886_v-fs_webp_8d16ae90-fdfa-4638-ad34-f61a18356ac1_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-800x800_v-fs_webp_f3927eea-53d0-4abd-8f1a-11e826bea860_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-1480x1478_v-fms_webp_42fef665-d655-40d3-b1fc-6b7bde8498a7_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-1000x1000_v-fs_webp_2d2edb06-66dc-466e-a8fe-fa9e157c0137_small.webp',
  ];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Background face grid (10x6 = 60 cells)
  const gridEl = document.getElementById('faceGrid');
  const totalCells = 60;
  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'face-cell';
    // Spiral-out reveal from center
    const row = Math.floor(i / 10);
    const col = i % 10;
    const cx = Math.abs(col - 4.5);
    const cy = Math.abs(row - 2.5);
    const dist = Math.sqrt(cx * cx + cy * cy);
    cell.style.animationDelay = `${0.1 + dist * 0.12}s`;
    const img = document.createElement('img');
    img.src = speakerImages[i % speakerImages.length];
    img.alt = '';
    img.loading = 'eager';
    cell.appendChild(img);
    gridEl.appendChild(cell);
  }

  // Set SVG pattern images
  const shuffled = shuffle(speakerImages);
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('patImg' + i);
    if (el) el.setAttribute('href', shuffled[i % shuffled.length]);
  }

  // Generate sparkle particles (celebratory feel)
  const particlesEl = document.getElementById('particles');
  const shapes = ['circle', 'square', 'line'];
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    const shape = shapes[i % 3];
    p.className = `particle particle--${shape}`;
    p.style.left = (5 + Math.random() * 90) + '%';
    p.style.top = (60 + Math.random() * 40) + '%';
    p.style.animationDuration = (3 + Math.random() * 5) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';

    if (shape === 'line') {
      p.style.width = (12 + Math.random() * 20) + 'px';
      p.style.height = '2px';
    } else {
      const size = (3 + Math.random() * 6) + 'px';
      p.style.width = size;
      p.style.height = size;
    }
    particlesEl.appendChild(p);
  }
</script>
</body>
</html>
