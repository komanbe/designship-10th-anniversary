<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designship 10th Anniversary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #E6007E;
    --dark: #0d0d14;
    --grid-cols: 10;
    --grid-rows: 6;
  }

  body {
    background: var(--dark);
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    width: 100vw;
    height: 100vh;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* === Face Grid Background === */
  .face-grid {
    position: absolute;
    inset: -10px;
    display: grid;
    grid-template-columns: repeat(var(--grid-cols), 1fr);
    grid-template-rows: repeat(var(--grid-rows), 1fr);
    gap: 2px;
  }

  .face-cell {
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: scale(1.2);
    animation: cellReveal 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  .face-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(80%) brightness(0.45);
  }

  @keyframes cellReveal {
    to { opacity: 1; transform: scale(1); }
  }

  /* === Dark overlay === */
  .overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(
      ellipse at center,
      rgba(13, 13, 20, 0.25) 0%,
      rgba(13, 13, 20, 0.8) 65%,
      rgba(13, 13, 20, 0.95) 100%
    );
  }

  /* === Giant "10th" background text === */
  .big-tenth {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    overflow: hidden;
  }

  .big-tenth-text {
    font-size: clamp(200px, 45vw, 550px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px rgba(230, 0, 126, 0.25);
    opacity: 0;
    animation: bigTenthIn 2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    user-select: none;
  }

  @keyframes bigTenthIn {
    from { opacity: 0; transform: scale(0.85); filter: blur(20px); }
    to { opacity: 1; transform: scale(1); filter: blur(0); }
  }

  /* === "10" with face clipping (canvas-based) === */
  .ten-canvas-wrap {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  #tenCanvas {
    max-width: 70vw;
    max-height: 60vh;
    opacity: 0;
    animation: canvasIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
  }

  @keyframes canvasIn {
    from { opacity: 0; transform: scale(0.9); filter: blur(8px); }
    to { opacity: 1; transform: scale(1); filter: blur(0); }
  }

  /* === Text content === */
  .content {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    pointer-events: none;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 20px;
    border: 1px solid rgba(230, 0, 126, 0.5);
    border-radius: 100px;
    background: rgba(230, 0, 126, 0.08);
    backdrop-filter: blur(10px);
    font-size: clamp(10px, 1.2vw, 13px);
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--pink);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(15px);
    animation: textUp 0.8s ease-out 1.8s forwards;
    margin-bottom: 20px;
  }

  .badge::before,
  .badge::after {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--pink);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .title-main {
    font-size: clamp(52px, 11vw, 130px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 0.9;
    opacity: 0;
    transform: translateY(30px);
    animation: textUp 1s ease-out 2.0s forwards;
    background: linear-gradient(
      180deg,
      #ffffff 0%,
      #ffffff 50%,
      var(--pink) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-tagline {
    font-size: clamp(10px, 1.1vw, 14px);
    font-weight: 500;
    letter-spacing: 0.25em;
    margin-top: 20px;
    opacity: 0;
    transform: translateY(20px);
    animation: textUp 0.8s ease-out 2.5s forwards;
    color: rgba(255, 255, 255, 0.4);
  }

  @keyframes textUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* === Confetti particles === */
  .particles {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    opacity: 0;
    animation: sparkle ease-in-out infinite;
  }

  .particle--circle { border-radius: 50%; background: var(--pink); }
  .particle--square { background: #D4AF37; transform: rotate(45deg); }
  .particle--line { background: rgba(255, 255, 255, 0.5); border-radius: 2px; }

  @keyframes sparkle {
    0% { opacity: 0; transform: translateY(0) scale(0) rotate(0deg); }
    15% { opacity: 0.7; }
    50% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-55vh) scale(1) rotate(360deg); }
  }

  /* === Accent lines === */
  .accent-line {
    position: absolute;
    z-index: 8;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
    height: 1px;
    opacity: 0;
    animation: lineReveal 1.2s ease-out forwards;
  }
  .accent-line--top { top: 18%; left: 8%; right: 8%; animation-delay: 1.6s; }
  .accent-line--bottom { bottom: 18%; left: 8%; right: 8%; animation-delay: 1.8s; }

  @keyframes lineReveal {
    from { opacity: 0; transform: scaleX(0); }
    to { opacity: 0.35; transform: scaleX(1); }
  }

  /* === Shimmer === */
  .shimmer {
    position: absolute;
    inset: 0;
    z-index: 7;
    background: linear-gradient(
      105deg,
      transparent 0%, transparent 40%,
      rgba(230, 0, 126, 0.1) 45%,
      rgba(230, 0, 126, 0.18) 50%,
      rgba(230, 0, 126, 0.1) 55%,
      transparent 60%, transparent 100%
    );
    background-size: 200% 100%;
    animation: shimmerMove 4s ease-in-out 2.5s infinite;
    pointer-events: none;
  }

  @keyframes shimmerMove {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* === Scroll hint === */
  .scroll-hint {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    animation: fadeIn 0.6s ease 3.5s forwards;
  }

  .scroll-hint span {
    font-size: 9px;
    letter-spacing: 0.4em;
    color: rgba(255, 255, 255, 0.3);
    font-weight: 500;
  }

  .scroll-line {
    width: 1px;
    height: 36px;
    background: linear-gradient(180deg, var(--pink), transparent);
    animation: scrollPulse 1.8s ease-in-out infinite;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.2; transform: scaleY(0.5); }
    50% { opacity: 0.8; transform: scaleY(1); }
  }
</style>
</head>
<body>
<div class="hero">
  <!-- Background face grid -->
  <div class="face-grid" id="faceGrid"></div>

  <!-- Dark vignette overlay -->
  <div class="overlay"></div>

  <!-- Giant "10th" outline text behind everything -->
  <div class="big-tenth">
    <span class="big-tenth-text">10th</span>
  </div>

  <!-- "10" with faces clipped inside (canvas) -->
  <div class="ten-canvas-wrap">
    <canvas id="tenCanvas" width="800" height="400"></canvas>
  </div>

  <!-- Accent lines -->
  <div class="accent-line accent-line--top"></div>
  <div class="accent-line accent-line--bottom"></div>

  <!-- Text content -->
  <div class="content">
    <div class="badge">10th Anniversary</div>
    <h1 class="title-main">Designship</h1>
    <p class="title-tagline">TOKYO MIDTOWN HALL & CONFERENCE</p>
  </div>

  <!-- Shimmer -->
  <div class="shimmer"></div>

  <!-- Sparkle particles -->
  <div class="particles" id="particles"></div>

  <!-- Scroll hint -->
  <div class="scroll-hint">
    <span>SCROLL</span>
    <div class="scroll-line"></div>
  </div>
</div>

<script>
  const speakerImages = [
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-600x600_v-fs_webp_fc5327e0-1e3c-42c9-9028-c731c4caed77_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-912x912_v-fs_webp_b2877c9d-2ce1-4dae-b2b1-438b7b4cd027_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-886x886_v-fs_webp_8d16ae90-fdfa-4638-ad34-f61a18356ac1_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-800x800_v-fs_webp_f3927eea-53d0-4abd-8f1a-11e826bea860_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-1480x1478_v-fms_webp_42fef665-d655-40d3-b1fc-6b7bde8498a7_small.webp',
    'https://storage.googleapis.com/studio-cms-assets/projects/RQqJk5Zag0/s-1000x1000_v-fs_webp_2d2edb06-66dc-466e-a8fe-fa9e157c0137_small.webp',
  ];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Background face grid (10x6 = 60 cells)
  const gridEl = document.getElementById('faceGrid');
  for (let i = 0; i < 60; i++) {
    const cell = document.createElement('div');
    cell.className = 'face-cell';
    const row = Math.floor(i / 10);
    const col = i % 10;
    const dist = Math.sqrt(Math.pow(col - 4.5, 2) + Math.pow(row - 2.5, 2));
    cell.style.animationDelay = `${0.1 + dist * 0.1}s`;
    const img = document.createElement('img');
    img.src = speakerImages[i % speakerImages.length];
    img.alt = '';
    img.loading = 'eager';
    cell.appendChild(img);
    gridEl.appendChild(cell);
  }

  // Draw "10" on canvas with face images clipped inside
  const canvas = document.getElementById('tenCanvas');
  const ctx = canvas.getContext('2d');
  const W = 800, H = 400;

  // Load all images first, then draw
  const imgs = [];
  let loaded = 0;
  const shuffled = shuffle(speakerImages);

  shuffled.forEach((src, i) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      loaded++;
      if (loaded === shuffled.length) drawTen();
    };
    img.onerror = () => {
      loaded++;
      if (loaded === shuffled.length) drawTen();
    };
    img.src = src;
    imgs.push(img);
  });

  function drawTen() {
    // Draw face mosaic on full canvas
    const cols = 8, rows = 4;
    const cw = W / cols, ch = H / rows;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const img = imgs[(r * cols + c) % imgs.length];
        if (img.complete && img.naturalWidth > 0) {
          ctx.drawImage(img, c * cw, r * ch, cw, ch);
        }
      }
    }

    // Use composite to clip to "10" text shape
    ctx.globalCompositeOperation = 'destination-in';
    ctx.font = '900 340px Montserrat, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText('10', W / 2, H / 2 + 10);

    // Add pink tint overlay
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = 'rgba(230, 0, 126, 0.15)';
    ctx.fillRect(0, 0, W, H);

    // Add stroke outline
    ctx.globalCompositeOperation = 'source-over';
    ctx.font = '900 340px Montserrat, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(230, 0, 126, 0.5)';
    ctx.lineWidth = 2;
    ctx.strokeText('10', W / 2, H / 2 + 10);
  }

  // Sparkle particles
  const particlesEl = document.getElementById('particles');
  const shapes = ['circle', 'square', 'line'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    const shape = shapes[i % 3];
    p.className = `particle particle--${shape}`;
    p.style.left = (5 + Math.random() * 90) + '%';
    p.style.top = (60 + Math.random() * 40) + '%';
    p.style.animationDuration = (3 + Math.random() * 5) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';
    if (shape === 'line') {
      p.style.width = (12 + Math.random() * 20) + 'px';
      p.style.height = '2px';
    } else {
      const size = (3 + Math.random() * 6) + 'px';
      p.style.width = size;
      p.style.height = size;
    }
    particlesEl.appendChild(p);
  }
</script>
</body>
</html>
